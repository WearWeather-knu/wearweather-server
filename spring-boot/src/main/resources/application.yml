server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

supabase:
  url: ${SUPABASE_URL:}
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}
  storage:
    clothes-bucket: ${SUPABASE_CLOTHES_BUCKET:clothes-images}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  image-model: ${GEMINI_IMAGE_MODEL:gemini-2.5-flash-image}

app:
  outfit-recommendation:
    connect-timeout-seconds: ${OUTFIT_RECOMMENDATION_CONNECT_TIMEOUT_SECONDS:5}
    request-timeout-seconds: ${OUTFIT_RECOMMENDATION_REQUEST_TIMEOUT_SECONDS:30}
    max-image-bytes: ${OUTFIT_RECOMMENDATION_MAX_IMAGE_BYTES:5242880}
  clothes-import:
    token-secret: ${CLOTHES_IMPORT_TOKEN_SECRET:}
    token-ttl-seconds: ${CLOTHES_IMPORT_TOKEN_TTL_SECONDS:900}
    connect-timeout-seconds: ${CLOTHES_IMPORT_CONNECT_TIMEOUT_SECONDS:3}
    request-timeout-seconds: ${CLOTHES_IMPORT_REQUEST_TIMEOUT_SECONDS:8}
    gemini-max-attempts: ${CLOTHES_IMPORT_GEMINI_MAX_ATTEMPTS:3}
    gemini-retry-backoff-millis: ${CLOTHES_IMPORT_GEMINI_RETRY_BACKOFF_MILLIS:300}
    max-html-bytes: ${CLOTHES_IMPORT_MAX_HTML_BYTES:2097152}
    max-image-bytes: ${CLOTHES_IMPORT_MAX_IMAGE_BYTES:5242880}
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}

logging:
  level:
    wearweather.wearweather_server.application.auth: DEBUG
    wearweather.wearweather_server.application.gemini: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
